name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-test-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Go test
        run: go test ./...

  test-python-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip fairlearn pandas

      - name: Run fairness bridge script
        run: |
          python scripts/fairness_metrics.py \
            --input examples/eval_sample.csv \
            --output /tmp/fairness-output.json
          test -f /tmp/fairness-output.json

      - name: Run carbon bridge script
        run: |
          python scripts/carbon_metrics.py \
            --input examples/eval_sample.csv \
            --output /tmp/carbon-output.json
          test -f /tmp/carbon-output.json

  integration-cli:
    runs-on: ubuntu-latest
    needs: [lint-test-go, test-python-bridge]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run integration tests
        run: go test ./tests/integration -v

      - name: Run API hardening integration tests
        run: go test ./tests/integration -run TestAPIServerAuthAndRateLimit -v

      - name: Generate sample artifacts
        if: github.ref == 'refs/heads/main'
        env:
          MCG_FAIRNESS_SCRIPT: tests/fixtures/fairness_stub.py
          MCG_PYTHON_BIN: python3
          MCG_CARBON_FIXTURE: tests/fixtures/carbon/carbon_fixture.json
        run: |
          go run ./cmd/mcg-cli generate \
            --model demo-model \
            --source custom \
            --uri tests/fixtures/custom_metadata.json \
            --eval-file examples/eval_sample.csv \
            --formats md,json,html \
            --out-dir artifacts/sample \
            --template standard

      - name: Upload sample artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: model-card-sample
          path: artifacts/sample

  web-smoke:
    runs-on: ubuntu-latest
    needs: [lint-test-go]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Run web unit tests
        run: cd web && npm run test:unit

      - name: Build web app
        run: cd web && npm run build

      - name: Build CLI binary for web smoke
        run: |
          mkdir -p bin
          go build -o ./bin/mcg ./cmd/mcg-cli

      - name: Run web smoke test
        run: cd web && MCG_CLI_BIN=./bin/mcg npm run test:smoke

  integration-live-wandb:
    runs-on: ubuntu-latest
    needs: [lint-test-go, test-python-bridge]
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run optional live W&B integration test
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_LIVE_MODEL: ${{ secrets.WANDB_LIVE_MODEL }}
        run: |
          if [ -z "${WANDB_API_KEY}" ] || [ -z "${WANDB_LIVE_MODEL}" ]; then
            echo "Skipping live W&B test: WANDB_API_KEY/WANDB_LIVE_MODEL not set."
            exit 0
          fi
          go test ./tests/integration -run TestCLIWandBLive -v

  integration-live-mlflow:
    runs-on: ubuntu-latest
    needs: [lint-test-go, test-python-bridge]
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run optional live MLflow integration test
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_TOKEN: ${{ secrets.MLFLOW_TRACKING_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          MLFLOW_LIVE_RUN_ID: ${{ secrets.MLFLOW_LIVE_RUN_ID }}
        run: |
          if [ -z "${MLFLOW_TRACKING_URI}" ] || [ -z "${MLFLOW_LIVE_RUN_ID}" ]; then
            echo "Skipping live MLflow test: MLFLOW_TRACKING_URI/MLFLOW_LIVE_RUN_ID not set."
            exit 0
          fi
          go test ./tests/integration -run TestCLIMLflowLive -v

  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -o "dist/mcg-${GOOS}-${GOARCH}${ext}" ./cmd/mcg-cli

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: mcg-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
