name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint-test-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Go test
        run: go test ./...

  test-python-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install --upgrade pip fairlearn pandas

      - name: Run fairness bridge script
        run: |
          python scripts/fairness_metrics.py \
            --input examples/eval_sample.csv \
            --output /tmp/fairness-output.json
          test -f /tmp/fairness-output.json

  integration-cli:
    runs-on: ubuntu-latest
    needs: [lint-test-go, test-python-bridge]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run integration tests
        run: go test ./tests/integration -v

      - name: Generate sample artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          go run ./cmd/mcg-cli generate \
            --model demo-model \
            --source custom \
            --uri tests/fixtures/custom_metadata.json \
            --eval-file examples/eval_sample.csv \
            --formats md,json,html \
            --out-dir artifacts/sample \
            --template standard

      - name: Upload sample artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: model-card-sample
          path: artifacts/sample

  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -o "dist/mcg-${GOOS}-${GOARCH}${ext}" ./cmd/mcg-cli

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: mcg-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
